server {
    listen 80;
    server_name onlyfix.local www.onlyfix.local localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Increase buffer sizes
    client_max_body_size 256M;
    client_body_buffer_size 256M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── Vite dev server proxy ──────────────────────────────────────
    # HTTP asset traffic routes through nginx so the browser fetches
    # JS/CSS from the same origin.  HMR is disabled in Docker mode
    # (Docker Desktop for Windows cannot forward WebSocket connections
    # and Vite 7 blocks rendering when the handshake fails).

    location /@vite/ {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /__vite_ping {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Pre-bundled dependencies
    location /node_modules/ {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Source files served by Vite (JS, TS, Vue, CSS via Vite transform)
    location /resources/ {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        # Increase timeouts
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Static files caching (only for files in public/, not /resources/)
    location ~* ^/(?!resources/|node_modules/|@vite/).*\.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /\.(?:env|git|svn) {
        deny all;
    }
}
