services:
  # PHP-FPM (Laravel backend)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: onlyfix_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./onlyfix:/var/www/html
      - composer_cache:/root/.composer
      - vendor_data:/var/www/html/vendor
    environment:
      - PHP_IDE_CONFIG=serverName=onlyfix
    depends_on:
      - db
      - mailpit
    networks:
      onlyfix:
        ipv4_address: 172.20.0.10

  # Nginx webserver
  nginx:
    image: nginx:alpine
    container_name: onlyfix_nginx
    restart: unless-stopped
    ports:
      - "127.0.1.1:80:80"
    volumes:
      - ./onlyfix:/var/www/html:ro
      - vendor_data:/var/www/html/vendor:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      onlyfix:
        ipv4_address: 172.20.0.2
  # Node.js (Vite dev server)
  node:
    image: node:20-alpine
    container_name: onlyfix_node
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./onlyfix:/app
      - node_modules:/app/node_modules
    command: sh -c "mkdir -p /app/public/swagger-ui && npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "127.0.1.4:5173:5173"
    environment:
      - DOCKER=1
      - VITE_HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    networks:
      onlyfix:
        ipv4_address: 172.20.0.3

  # MySQL database
  db:
    image: mysql:8.0
    container_name: onlyfix_db
    restart: unless-stopped
    ports:
      - "127.0.1.2:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootSecurePassword123!
      MYSQL_DATABASE: onlyfix
      MYSQL_USER: onlyfix
      MYSQL_PASSWORD: onlyfixSecurePass456!
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/logs/mysql:/var/log/mysql
    networks:
      onlyfix:
        ipv4_address: 172.20.0.4

  # Mailpit (email testing)
  mailpit:
    image: axllent/mailpit
    container_name: onlyfix_mailpit
    restart: unless-stopped
    ports:
      - "127.0.1.3:1025:1025"
      - "127.0.1.3:8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      onlyfix:
        ipv4_address: 172.20.0.5

  # Queue worker (email sending)
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: onlyfix_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./onlyfix:/var/www/html
      - composer_cache:/root/.composer
      - vendor_data:/var/www/html/vendor
    command: php artisan queue:listen --verbose --tries=3 --timeout=90
    depends_on:
      - app
      - db
      - mailpit
    networks:
      onlyfix:
        ipv4_address: 172.20.0.6

  # phpMyAdmin (database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: onlyfix_phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.1.5:8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: onlyfix
      PMA_PASSWORD: onlyfixSecurePass456!
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 256M
    depends_on:
      - db
    networks:
      onlyfix:
        ipv4_address: 172.20.0.7

volumes:
  db_data:
    driver: local
  composer_cache:
    driver: local
  node_modules:
    driver: local
  vendor_data:
    driver: local

networks:
  onlyfix:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
